name: oviewer
description: A manga viewer app for E-Hentai
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.2

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  get_it: ^7.6.4

  # Network
  dio: ^5.3.4
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  html: ^0.15.4
  connectivity_plus: ^5.0.2

  # Image & Cache
  cached_network_image: ^3.3.0
  flutter_cache_manager: ^3.3.1
  photo_view: ^0.14.0

  # Local Storage
  shared_preferences: ^2.2.2
  drift: ^2.13.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3

  # UI
  flutter_staggered_grid_view: ^0.7.0
  pull_to_refresh: ^2.0.0
  scrollable_positioned_list: ^0.3.8
  shimmer: ^3.0.0
  flutter_slidable: ^3.0.1
  badges: ^3.1.2

  # WebView (Login) - MUST stay on 5.x for iOS 11
  flutter_inappwebview: ^5.8.0

  # Utils
  intl: ^0.18.1
  url_launcher: ^6.2.1
  share_plus: ^7.2.1
  package_info_plus: ^5.0.1
  permission_handler: ^11.0.1
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  drift_dev: ^2.13.0
  bloc_test: ^9.1.5
  mocktail: ^1.0.1

flutter:
  uses-material-design: true